<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wine Guide India</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

header {
    text-align: center;
    padding: 15px;
    background: black;
    font-size: 22px;
}

.hero {
    text-align: center;
    padding: 30px;
}

.container {
    padding: 15px;
}

.card {
    background: #1c1c1c;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    cursor: pointer;
}

.card:hover {
    background: #333;
}

.article {
    display: none;
    padding: 20px;
}

button {
    background: crimson;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
    width: 100%;
}

.ad {
    background: #222;
    padding: 15px;
    text-align: center;
    margin: 20px 0;
}

</style>

<script>
function openArticle(title, content) {
    document.getElementById("home").style.display = "none";
    document.getElementById("article").style.display = "block";

    document.getElementById("title").innerText = title;
    document.getElementById("content").innerHTML = content;
}

function back() {
    document.getElementById("home").style.display = "block";
    document.getElementById("article").style.display = "none";
}
</script>

</head>

<body>

<header>🍷 Wine Guide India</header>

<!-- HOME -->
<div id="home">

<div class="hero">
<h1>Best Wine Guide</h1>
<p>Learn & Explore</p>
</div>

<div class="container">

<div class="card" onclick="openArticle('Best Wine Under ₹1000', article1)">
<h2>Best Wine Under ₹1000</h2>
</div>

<div class="card" onclick="openArticle('Wine for Beginners', article2)">
<h2>Wine for Beginners</h2>
</div>

<div class="card" onclick="openArticle('Buy Wine in Mumbai', article3)">
<h2>Buy Wine in Mumbai</h2>
</div>

</div>
</div>

<!-- ARTICLE PAGE -->
<div id="article" class="article">

<button onclick="back()">⬅ Back</button>

<h2 id="title"></h2>

<div class="ad">
📢 Ad Space (AdSense code here)
</div>

<p id="content"></p>

<div class="ad">
📢 Ad Space
</div>

</div>

<script>

// ARTICLES

let article1 = `
<p>Top affordable wines include Sula & Fratelli.</p>

<a href="https://www.amazon.in" target="_blank">
<button>Buy Wine Glass 🍷</button>
</a>

<a href="https://wa.me/91XXXXXXXXXX" target="_blank">
<button>Contact Seller</button>
</a>
`;

let article2 = `
<p>Start with sweet wines. Avoid strong wines initially.</p>

<a href="https://www.amazon.in" target="_blank">
<button>Buy Starter Kit</button>
</a>
`;

let article3 = `
<p>Top shops available in Mumbai area.</p>

<a href="https://wa.me/91XXXXXXXXXX" target="_blank">
<button>Get Seller Contact</button>
</a>
`;

</script>

</body>
</html>
