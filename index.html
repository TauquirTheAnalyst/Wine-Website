<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wine App 🍷</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins;background:#111;color:white;}

.header{
padding:10px;
background:#1c1c1c;
position:sticky;
top:0;
z-index:100;
}

.search{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-bottom:10px;
}

.filter{
display:flex;
gap:10px;
}

.filter button{
flex:1;
padding:8px;
border:none;
border-radius:8px;
background:#333;
color:white;
}

.container{
padding:10px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
}

.card{
background:#1c1c1c;
padding:10px;
border-radius:15px;
text-align:center;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.rating{color:gold;}
.price{color:#4caf50;}

.btn{
background:#ff4d4d;
padding:8px;
display:block;
margin-top:5px;
border-radius:8px;
color:white;
text-decoration:none;
}
</style>
</head>

<body>

<div class="header">
<input type="text" id="search" class="search" placeholder="Search wine...">

<div class="filter">
<button onclick="filterPrice()">Price ↓</button>
<button onclick="filterRating()">Rating ⭐</button>
</div>
</div>

<div id="products" class="container"></div>

<script>

function display(data){
let html="";
data.forEach(w=>{

<a href="${w.link}" target="_blank" class="btn">Buy</a>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

display(wines);
