<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wine Guide India</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 22px;
}

.hero {
  text-align: center;
  padding: 40px 20px;
}

.hero h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

.hero p {
  color: #aaa;
}

.container {
  padding: 20px;
}

.card {
  background: linear-gradient(145deg, #1a1a1a, #222);
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 15px;
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: scale(1.05);
  background: #2a2a2a;
}

.card h2 {
  margin: 0;
}

footer {
  text-align: center;
  padding: 20px;
  color: #888;
  font-size: 14px;
}
</style>
</head>

<body>

<header>🍷 Wine Guide India</header>

<div class="hero">
  <h1>Best Wine Guide</h1>
  <p>Learn & Explore Premium Wines</p>
</div>

<div class="container">

  <div class="card" onclick="openPage('under1000')">
    <h2>Best Wine Under ₹1000</h2>
  </div>

  <div class="card" onclick="openPage('beginners')">
    <h2>Wine for Beginners</h2>
  </div>

  <div class="card" onclick="openPage('mumbai')">
    <h2>Buy Wine in Mumbai</h2>
  </div>

</div>

<footer>
  © 2026 Wine Guide India | Made by Tauquir
</footer>

<script>
function openPage(type) {
  if(type === 'under1000'){
    alert("Top Picks:\n- Sula Red\n- Fratelli Classic\n- Grover Zampa");
  }
  if(type === 'beginners'){
    alert("Start with:\n- Sweet Wine\n- Rosé Wine\n- Light Red Wine");
  }
  if(type === 'mumbai'){
    alert("Buy from:\n- Local Wine Shops\n- Premium Stores\n- Online Apps");
  }
}
</script>

</body>
</html>
