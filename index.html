<!DOCTYPE html>
<html>
<head>
<title>Free Tools Hub 🚀</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
margin:0;
background:#111;
color:white;
}

header{
background:black;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:15px;
}

.card{
background:#1c1c1c;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

button{
margin-top:10px;
width:100%;
padding:10px;
background:#4caf50;
color:white;
border:none;
border-radius:5px;
}

.output{
margin-top:10px;
background:#000;
padding:10px;
border-radius:5px;
}
</style>
</head>

<body>

<header>🚀 Free Tools Hub</header>

<div class="container">

<!-- CAPTION GENERATOR -->
<div class="card">
<h3>Instagram Caption Generator</h3>
<button onclick="caption()">Generate Caption</button>
<div id="caption" class="output"></div>
</div>

<!-- PASSWORD -->
<div class="card">
<h3>Password Generator</h3>
<button onclick="password()">Generate Password</button>
<div id="password" class="output"></div>
</div>

<!-- NAME GENERATOR -->
<div class="card">
<h3>Name Generator</h3>
<button onclick="nameGen()">Generate Name</button>
<div id="name" class="output"></div>
</div>

</div>

<script>

function caption(){
let captions=[
"Living my best life ✨",
"No filter needed 😎",
"Dream big, hustle harder 💪",
"Good vibes only 🌈",
"Smile more 😊"
];
document.getElementById("caption").innerText=
captions[Math.floor(Math.random()*captions.length)];
}

function password(){
let pass=Math.random().toString(36).slice(-8);
document.getElementById("password").innerText=pass;
}

function nameGen(){
let names=["Alpha","Nova","Zen","Pixel","Rocket","Prime"];
document.getElementById("name").innerText=
names[Math.floor(Math.random()*names.length)];
}

</script>

</body>
</html>
